<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>装修流程指南 | 避坑手册 + 施工标准</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f0f;
            --bg-card: #1a1a1a;
            --bg-hover: #242424;
            --text: #f5f5f5;
            --text-dim: #999;
            --accent: #d4a574;
            --border: #333;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.8;
        }

        /* 顶部搜索栏 */
        .search-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(15,15,15,0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            z-index: 1000;
            padding: 12px 16px;
        }

        .search-bar-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--accent);
            white-space: nowrap;
        }

        #searchInput {
            flex: 1;
            max-width: 400px;
            padding: 8px 14px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 14px;
        }

        #searchInput:focus {
            outline: none;
            border-color: var(--accent);
        }

        #searchCount {
            font-size: 13px;
            color: var(--text-dim);
            white-space: nowrap;
        }

        /* 主内容区 */
        main {
            max-width: 900px;
            margin: 0 auto;
            padding: 80px 16px 60px;
        }

        /* 章节卡片 */
        .chapter {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 12px;
            overflow: hidden;
        }

        .chapter-header {
            padding: 16px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s;
        }

        .chapter-header:hover {
            background: var(--bg-hover);
        }

        .chapter-title {
            font-size: 1rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chapter-num {
            color: var(--accent);
            font-weight: 600;
        }

        .chapter-arrow {
            transition: transform 0.3s;
            color: var(--text-dim);
        }

        .chapter.open .chapter-arrow {
            transform: rotate(90deg);
        }

        .chapter-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }

        .chapter.open .chapter-content {
            max-height: 50000px;
        }

        .chapter-inner {
            padding: 0 16px 16px;
            border-top: 1px solid var(--border);
        }

        /* 子项 */
        .item {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            margin-top: 12px;
            overflow: hidden;
        }

        .item-header {
            padding: 12px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s;
        }

        .item-header:hover {
            background: var(--bg-hover);
        }

        .item-title {
            font-size: 0.95rem;
            font-weight: 500;
        }

        .item-arrow {
            transition: transform 0.3s;
            color: var(--text-dim);
            font-size: 0.8rem;
        }

        .item.open .item-arrow {
            transform: rotate(90deg);
        }

        .item-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }

        .item.open .item-content {
            max-height: 20000px;
        }

        .item-inner {
            padding: 12px;
            border-top: 1px solid var(--border);
            font-size: 0.9rem;
            color: #ccc;
        }

        .item-inner ul {
            margin: 8px 0 8px 20px;
        }

        .item-inner li {
            margin: 6px 0;
        }

        .highlight {
            background: rgba(212, 165, 116, 0.3);
            padding: 1px 2px;
            border-radius: 2px;
        }

        .hidden { display: none !important; }

        /* 回到顶部 */
        #backToTop {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 44px;
            height: 44px;
            background: var(--accent);
            border: none;
            border-radius: 50%;
            color: var(--bg);
            font-size: 20px;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 999;
        }

        #backToTop.show { opacity: 1; }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-dim);
        }
    </style>
</head>

    <main id="content"></main>

    <button id="backToTop">↑</button>

    // 渲染内容
    function render() {
        const container = document.getElementById('content');
        container.innerHTML = chapters.map((ch, ci) => `
            <div class="chapter" data-chapter="${ci}">
                <div class="chapter-header" onclick="toggleChapter(${ci})">
                    <div class="chapter-title">
                        <span class="chapter-num">${String(ci + 1).padStart(2, '0')}</span>
                        ${ch.title}
                    </div>
                    <span class="chapter-arrow">▶</span>
                </div>
                <div class="chapter-content">
                    <div class="chapter-inner">
                        ${ch.items.map((item, ii) => `
                            <div class="item" data-item="${ci}-${ii}">
                                <div class="item-header" onclick="toggleItem(${ci}, ${ii})">
                                    <span class="item-title">${item.title}</span>
                                    <span class="item-arrow">▶</span>
                                </div>
                                <div class="item-content">
                                    <div class="item-inner">${item.content}</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            </div>
        `).join('');
    }

    // 切换章节
    function toggleChapter(ci) {
        const chapter = document.querySelector(`[data-chapter="${ci}"]`);
        chapter.classList.toggle('open');
    }

    // 切换子项
    function toggleItem(ci, ii) {
        const item = document.querySelector(`[data-item="${ci}-${ii}"]`);
        item.classList.toggle('open');
        event.stopPropagation();
    }

    // 搜索功能
    const searchInput = document.getElementById('searchInput');
    const searchCount = document.getElementById('searchCount');

    searchInput.addEventListener('input', function() {
        const keyword = this.value.trim().toLowerCase();
        let matchCount = 0;

        if (!keyword) {
            // 显示全部
            document.querySelectorAll('.chapter').forEach(ch => ch.classList.remove('hidden'));
            document.querySelectorAll('.item').forEach(it => it.classList.remove('hidden'));
            document.querySelectorAll('.highlight').forEach(el => {
                el.outerHTML = el.textContent;
            });
            searchCount.textContent = '';
            return;
        }

        // 搜索并高亮
        document.querySelectorAll('.chapter').forEach((chapter, ci) => {
            const ch = chapters[ci];
            let chapterHasMatch = false;

            // 搜索章节标题
            if (ch.title.toLowerCase().includes(keyword)) {
                chapterHasMatch = true;
            }

            // 搜索子项
            chapter.querySelectorAll('.item').forEach((item, ii) => {
                const itemData = ch.items[ii];
                const titleMatch = itemData.title.toLowerCase().includes(keyword);
                const contentMatch = itemData.content.toLowerCase().includes(keyword);

                if (titleMatch || contentMatch) {
                    item.classList.remove('hidden');
                    chapterHasMatch = true;
                    matchCount++;

                    // 展开包含关键词的项
                    if (contentMatch) {
                        chapter.classList.add('open');
                        item.classList.add('open');
                    }
                } else {
                    item.classList.add('hidden');
                }
            });

            if (chapterHasMatch) {
                chapter.classList.remove('hidden');
            } else {
                chapter.classList.add('hidden');
            }
        });

        searchCount.textContent = `找到 ${matchCount} 个结果`;
    });

    // 回到顶部
    const backToTop = document.getElementById('backToTop');
    window.addEventListener('scroll', () => {
        if (window.scrollY > 300) {
            backToTop.classList.add('show');
        } else {
            backToTop.classList.remove('show');
        }
    });
    backToTop.addEventListener('click', () => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    // 初始化
    render();
    </script>
