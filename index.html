<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>装修流程指南 | 避坑手册 + 施工标准</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0f0f0f;
            --bg-secondary: #1a1a1a;
            --bg-card: #242424;
            --text-primary: #f5f5f5;
            --text-secondary: #a0a0a0;
            --text-muted: #666;
            --accent: #d4a574;
            --accent-light: #e8c9a0;
            --border: #333;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.7;
        }

        /* 背景纹理 */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: 
                radial-gradient(ellipse at 20% 0%, rgba(212, 165, 116, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 100%, rgba(212, 165, 116, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* Hero 封面 */
        .hero {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4rem 2rem;
            overflow: hidden;
        }

        .hero-bg {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: 
                linear-gradient(180deg, transparent 0%, var(--bg-primary) 100%),
                url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><pattern id="grid" width="10" height="10" patternUnits="userSpaceOnUse"><path d="M 10 0 L 0 0 0 10" fill="none" stroke="rgba(212,165,116,0.05)" stroke-width="0.5"/></pattern></defs><rect width="100" height="100" fill="url(%23grid)"/></svg>');
            opacity: 0.5;
        }

        .hero-content {
            position: relative;
            text-align: center;
            max-width: 900px;
            z-index: 1;
        }

        .hero-badge {
            display: inline-block;
            padding: 0.5rem 1.5rem;
            background: rgba(212, 165, 116, 0.1);
            border: 1px solid rgba(212, 165, 116, 0.3);
            border-radius: 50px;
            font-size: 0.85rem;
            color: var(--accent);
            margin-bottom: 2rem;
            letter-spacing: 0.1em;
        }

        .hero h1 {
            font-family: 'Noto Serif SC', serif;
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero p {
            font-size: 1.2rem;
            color: var(--text-secondary);
            max-width: 600px;
            margin: 0 auto 3rem;
        }

        .hero-stats {
            display: flex;
            justify-content: center;
            gap: 3rem;
            margin-top: 2rem;
            flex-wrap: wrap;
        }

        .stat-item { text-align: center; }
        .stat-number {
            font-family: 'Noto Serif SC', serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--accent);
            display: block;
        }
        .stat-label {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .scroll-hint {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            color: var(--text-muted);
            font-size: 0.8rem;
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(10px); }
        }

        /* 搜索栏 */
        .search-bar {
            position: sticky;
            top: 0;
            background: rgba(15,15,15,0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            z-index: 1000;
            padding: 12px 16px;
        }

        .search-bar-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .logo {
            font-family: 'Noto Serif SC', serif;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--accent);
            white-space: nowrap;
        }

        #searchInput {
            flex: 1;
            max-width: 400px;
            padding: 10px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
            transition: border-color 0.2s;
        }

        #searchInput:focus {
            outline: none;
            border-color: var(--accent);
        }

        #searchCount {
            font-size: 13px;
            color: var(--text-muted);
            white-space: nowrap;
        }

        /* 主内容区 */
        main {
            position: relative;
            z-index: 1;
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem 16px 4rem;
        }

        /* 章节卡片 */
        .chapter {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 16px;
            overflow: hidden;
            transition: border-color 0.3s;
        }

        .chapter:hover {
            border-color: rgba(212, 165, 116, 0.3);
        }

        .chapter-header {
            padding: 20px 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: background 0.2s;
        }

        .chapter-header:hover {
            background: rgba(212, 165, 116, 0.03);
        }

        .chapter-number {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--accent) 0%, #b8956a 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Noto Serif SC', serif;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--bg-primary);
            flex-shrink: 0;
        }

        .chapter-title-group { flex: 1; }
        .chapter-title {
            font-family: 'Noto Serif SC', serif;
            font-size: 1.2rem;
            font-weight: 600;
        }
        .chapter-subtitle {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-top: 2px;
        }

        .chapter-toggle {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--bg-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s, background 0.2s;
        }

        .chapter.active .chapter-toggle {
            transform: rotate(180deg);
        }

        .chapter-toggle svg {
            width: 16px;
            height: 16px;
            stroke: var(--text-secondary);
        }

        .chapter-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease;
        }

        .chapter.active .chapter-content {
            max-height: 10000px;
        }

        .chapter-inner {
            padding: 0 24px 24px;
            border-top: 1px solid var(--border);
        }

        /* 子项 */
        .section {
            margin-top: 20px;
        }

        .section-header {
            padding: 12px 16px;
            background: var(--bg-secondary);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 500;
            transition: background 0.2s;
        }

        .section-header:hover {
            background: rgba(212, 165, 116, 0.08);
        }

        .section-toggle {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--bg-card);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .section.active .section-toggle {
            transform: rotate(180deg);
        }

        .section-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .section.active .section-content {
            max-height: 5000px;
        }

        .section-inner {
            padding: 16px;
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .section-inner ul {
            margin: 12px 0;
            padding-left: 20px;
        }

        .section-inner li {
            margin: 8px 0;
            line-height: 1.6;
        }

        .highlight {
            background: rgba(212, 165, 116, 0.2);
            padding: 2px 4px;
            border-radius: 3px;
        }

        .tag {
            display: inline-block;
            padding: 2px 8px;
            background: rgba(212, 165, 116, 0.15);
            border-radius: 4px;
            font-size: 0.8rem;
            color: var(--accent);
            margin-right: 6px;
        }

        /* 回到顶部 */
        .back-to-top {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 48px;
            height: 48px;
            background: var(--accent);
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(212, 165, 116, 0.3);
            transition: transform 0.2s, opacity 0.3s;
            z-index: 999;
        }

        .back-to-top:hover {
            transform: scale(1.1);
        }

        .back-to-top svg {
            width: 24px;
            height: 24px;
            stroke: var(--bg-primary);
        }

        .back-to-top.visible {
            display: flex;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .hero-stats { gap: 2rem; }
            .stat-number { font-size: 2rem; }
            .chapter-header { padding: 16px; }
            .chapter-number { width: 40px; height: 40px; font-size: 1rem; }
            .chapter-title { font-size: 1rem; }
            .logo { font-size: 1rem; }
            #searchInput { max-width: 200px; }
        }

        /* 搜索隐藏 */
        .hidden { display: none !important; }
    </style>
</head>
<body>

<!-- Hero 封面 -->
<section class="hero">
    <div class="hero-bg"></div>
    <div class="hero-content">
        <span class="hero-badge">🏠 装修避坑完全指南</span>
        <h1>装修流程<br>19步完整攻略</h1>
        <p>从验房到软装，一站式避坑手册。<br>装修公司套路、施工标准、材料品牌，一文全掌握。</p>
        <div class="hero-stats">
            <div class="stat-item">
                <span class="stat-number">30+</span>
                <span class="stat-label">装修公司套路</span>
            </div>
            <div class="stat-item">
                <span class="stat-number">50+</span>
                <span class="stat-label">全屋定制避坑</span>
            </div>
            <div class="stat-item">
                <span class="stat-number">20</span>
                <span class="stat-label">完整章节</span>
            </div>
        </div>
    </div>
    <div class="scroll-hint">↓ 向下滚动开始浏览</div>
</section>

<!-- 搜索栏 -->
<div class="search-bar">
    <div class="search-bar-inner">
        <span class="logo">装修指南</span>
        <input type="text" id="searchInput" placeholder="搜索关键词，如：套路、防水、验收...">
        <span id="searchCount"></span>
    </div>
</div>

<!-- 主内容 -->
<main id="content"></main>

<!-- 回到顶部 -->
<div class="back-to-top" id="backToTop">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 15l-6-6-6 6"/>
    </svg>
</div>

<script>
const chapters = [
    {
        number: "01",
        title: "新房毛坯验收",
        subtitle: "验房流程与注意事项",
        sections: [
            {
                title: "精装修房验房要点",
                content: `<ul>
                    <li><strong>强电弱电系统</strong>：检查配电箱、开关插座是否正常工作</li>
                    <li><strong>门窗密封性</strong>：检查门窗是否密封良好，有无漏风漏水</li>
                    <li><strong>下水管测试</strong>：倒水测试下水是否通畅</li>
                    <li><strong>柜子验收</strong>：检查柜门是否平整，五金件是否齐全</li>
                    <li><strong>空调烟机测试</strong>：测试空调、油烟机是否正常工作</li>
                </ul>`
            },
            {
                title: "新房毛坯验房",
                content: `<ul>
                    <li><strong>三书一证一表</strong>：住宅质量保证书、住宅使用说明书、建筑工程质量认定书、房地产开发建设项目竣工综合验收合格证、竣工验收备案表</li>
                    <li><strong>门窗管道检查</strong>：检查门窗安装是否牢固，管道是否完好</li>
                    <li><strong>墙面空鼓检测</strong>：用空鼓锤敲击墙面，检查是否有空鼓</li>
                </ul>`
            }
        ]
    },
    {
        number: "02",
        title: "装修前的准备工作",
        subtitle: "装修公司套路 + 预算评估 + 开工必购",
        sections: [
            {
                title: "装修公司套路合集",
                tags: ["套路"],
                content: `<ul>
                    <li><span class="tag">套路</span> 设计费全免 — 后期加项收费</li>
                    <li><span class="tag">套路</span> 水电报低价 — 实际超出一倍</li>

                    <li><span class="tag">套路</span> 活动限时优惠 — 制造紧迫感</li>
                    <li><span class="tag">套路</span> 全包省心 — 后期加项不断</li>
                </ul>`
            },
            {

                    <li>临时马桶、保护膜、钥匙管理盒</li>
                    <li>玻璃胶、三角阀、止逆阀</li>
                    <li>隔音棉、前置过滤器、地漏</li>
                    <li>灭火器（施工现场必备）</li>
                </ul>`
            }
        ]
    },
    {
        number: "03",
        title: "选择靠谱装饰公司",
        subtitle: "公司规模 / 服务保障 / 报价审核",
        sections: [
            {
                title: "判断公司规模",
                content: `<ul>

                    <li>考察办公环境、展厅规模</li>
                    <li>了解公司在建工地数量和质量</li>
                </ul>`
            },
            {
                title: "审核报价明细",
                tags: ["套路"],
                content: `<ul>
                    <li>检查是否有漏项（故意少报项目）</li>
                    <li>确认材料品牌、型号、规格</li>

        sections: [
            {
                title: "设计师能力评估",
                content: `<ul>
                    <li>查看过往案例（实地考察更佳）</li>
                    <li>沟通设计理念是否契合</li>
                    <li>了解项目跟进频率和服务内容</li>
                    <li>确认效果图与施工图是否包含</li>
                </ul>`
            }
        ]
    },
    {
        number: "05",
        title: "完整设计方案标准",
        subtitle: "平面图 / 效果图 / 施工图清单",
        sections: [
            {
                title: "施工图清单",
                content: `<ul>
                    <li>原始户型图</li>
                    <li>拆除/新建墙体定位图</li>
                    <li>平面布置图</li>
                    <li>天花造型图</li>
                    <li>开关插座布置图</li>
                    <li>给排水系统图</li>
                    <li>电路系统图</li>
                    <li>橱柜/衣柜详图</li>

// 渲染内容
function render() {
    const main = document.getElementById('content');
    let html = '';
    
    chapters.forEach((ch, i) => {
        html += `
            <div class="chapter" data-index="${i}">
                <div class="chapter-header" onclick="toggleChapter(${i})">
                    <div class="chapter-number">${ch.number}</div>
                    <div class="chapter-title-group">
                        <div class="chapter-title">${ch.title}</div>
                        <div class="chapter-subtitle">${ch.subtitle}</div>
                    </div>
                    <div class="chapter-toggle">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M6 9l6 6 6-6"/>
                        </svg>
                    </div>
                </div>
                <div class="chapter-content">
                    <div class="chapter-inner">
                        ${ch.sections.map((sec, j) => `
                            <div class="section" data-index="${j}">
                                <div class="section-header" onclick="toggleSection(event, ${i}, ${j})">
                                    <span>${sec.title}</span>
                                    <span class="section-toggle">▼</span>
                                </div>
                                <div class="section-content">
                                    <div class="section-inner">${sec.content}</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            </div>
        `;
    });
    
    main.innerHTML = html;
}

function toggleChapter(i) {
    const chapter = document.querySelector(`.chapter[data-index="${i}"]`);
    chapter.classList.toggle('active');
}

function toggleSection(e, ci, si) {
    e.stopPropagation();
    const section = document.querySelector(`.chapter[data-index="${ci}"] .section[data-index="${si}"]`);
    section.classList.toggle('active');
}

// 搜索功能
const searchInput = document.getElementById('searchInput');
const searchCount = document.getElementById('searchCount');

searchInput.addEventListener('input', function() {
    const query = this.value.toLowerCase().trim();
    
    if (!query) {
        document.querySelectorAll('.chapter').forEach(ch => ch.classList.remove('hidden'));
        document.querySelectorAll('.section').forEach(s => s.classList.remove('hidden'));
        searchCount.textContent = '';
        return;
    }
    
    let matchCount = 0;
    
    chapters.forEach((ch, i) => {
        const chapterEl = document.querySelector(`.chapter[data-index="${i}"]`);
        const chText = (ch.title + ch.subtitle).toLowerCase();
        let chapterMatch = chText.includes(query);
        
        ch.sections.forEach((sec, j) => {
            const secEl = chapterEl.querySelector(`.section[data-index="${j}"]`);
            const secText = (sec.title + sec.content).toLowerCase();
            const secMatch = secText.includes(query);
            
            if (secMatch) {
                secEl.classList.remove('hidden');
                chapterMatch = true;
                matchCount++;
            } else {
                secEl.classList.add('hidden');
            }
        });
        
        if (chapterMatch) {
            chapterEl.classList.remove('hidden');
            chapterEl.classList.add('active');
        } else {
            chapterEl.classList.add('hidden');
        }
    });
    
    searchCount.textContent = matchCount > 0 ? `找到 ${matchCount} 处匹配` : '无匹配结果';
});

// 回到顶部
const backToTop = document.getElementById('backToTop');

window.addEventListener('scroll', () => {
    if (window.scrollY > 300) {
        backToTop.classList.add('visible');
    } else {
        backToTop.classList.remove('visible');
    }
});

backToTop.addEventListener('click', () => {
    window.scrollTo({ top: 0, behavior: 'smooth' });
});

// 初始化
render();
</script>
